<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Bites</title>
  <link rel="stylesheet" href="contact.css">
</head>

<body>

  <!-- Navbar -->
  <header>
    <span onclick="openMenu()" class="menu-btn">☰</span>
    <h2 class="hd">Morning Bites</h2>
  </header>

  <!-- Sidebar -->
  <div id="sidebar" class="sidebar">
    <a href="#">Menu</a>
    <a href="#">Reservation</a>
    <a href="#">Delivery</a>
    <a href="#">About Us</a>
    <a href="#">Offers</a>
    <a href="#">Gallery</a>
    <a href="#">Contact Us</a>
  </div>

  <div id="overlay" class="overlay" onclick="closeMenu()"></div>

  <div class="middle-section">

    <div class="left">
      <div class="frnt-text">We Would Like To Hear From You!</div>
      <div class="frnt-line"></div>

      <div class="Contact-box">
        <div class="contact-item">
          <i class="icon"onclick="copyText('Morningbites@contact.com')"><i class="fa-solid fa-at"></i></i>
          <span class="email">Morningbites@contact.com</span>
        </div>

        <div class="contact-item">
          <i class="icon"onclick="copyText('Morningbites@contact.com')"><i class="fas fa-phone"></i></i>
          <span class="email">16992</span>
        </div>
        <div class="contact-item">
          <i class="icon"><i class="fa-solid fa-location-arrow"></i></i>
          <span class="email" >Capital University</span>
        </div>
      </div>

      <img 
        class="contact-image"
        src="ChatGPT_Image_Apr_25__2026__06_38_49_PM-removebg-preview.png" 
        alt="contact"
      >
    </div>

    <div class="right">
      <form onsubmit="showToast(event)">
        <label class="label-box">Name</label>
        <input type="text" class="input-box" required>

        <label class="label-box">Email</label>
        <input type="email" class="input-box" required>

        <label class="label-box">Subject</label>
        <input type="text" class="input-box" required>

        <label class="label-box">How can we help you</label>
        <textarea placeholder="Describe/etc.." required></textarea>

        <button type="submit" class="snd-btn">Send Message</button>
      </form>
    </div>

  </div>
  <div id="toast" class="toast">✓ Submitted Successfully</div>
  <footer>© 2026 Morning Bites. All rights reserved 
    <div><i class="fa-brands fa-instagram">    </i><i class="fa-brands fa-facebook"> </i><i class="fa-brands fa-twitter"></i></div>
  </footer>

  <script src="contact.js"></script>
  <script src="https://kit.fontawesome.com/467c6f59e3.js" crossorigin="anonymous"></script>
  </body>
