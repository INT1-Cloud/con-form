<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Morning Bites</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Navbar -->
<header>
  <span onclick="openMenu()" class="menu-btn">☰</span>
  <h2 class="hd">Morning Bites</h2>
</header>

<!-- Sidebar -->
<div id="sidebar" class="sidebar">
  <a href="#">Menu</a>
  <a href="#">Reservation</a>
  <a href="#">Delivery</a>
  <a href="#">About Us</a>
  <a href="#">Offers</a>
  <a href="#">Gallery</a>
  <a href="#">Contact Us</a>
</div>

<div id="overlay" class="overlay" onclick="closeMenu()"></div>
<div class="contact-section">
  <div class="tex">
    <div></div>
        <div class="like">We Would Like To Hear From You!</div>
        <div class="line"></div>
        <div class="Contact-box">
          <div class="contact-item">
            <i class="icon">✉</i>
            <span class="email">info.contact.com</span>
          </div>
          <div class="contact-item">
            <i class="icon">☎</i>
            <span class="email">17221</span>
          </div>
            </div>
            <img src="ChatGPT_Image_Apr_25__2026__06_38_49_PM-removebg-preview.png" alt="contact">
            </div>
            

    <div class="right-side">


        <form onsubmit="showToast(event)">
            <label class="label-box">Name</label>
            <input type="text" text="Name" class="input-box"required>
            <label class="label-box">Email</label>
            <input type="Email" text="Name" class="input-box"required>
            <label class="label-box">Subject</label>
            <input type="text" text="Name" class="input-box" required>
            <label class="label-box">How can we help you</label>
            <textarea placeholder="Describe/etc.." required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>
    <div id="toast" class="toast">✓ Submitted Successfully</div>

    </div>
    
<script src="script.js"></script>

</body>
</html>
